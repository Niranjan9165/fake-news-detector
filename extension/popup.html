<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <style>
        body {
            width: 350px;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
        }
        h2 {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 0.85rem;
            resize: none;
            outline: none;
        }
        textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }
        button {
            width: 100%;
            padding: 10px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.fake {
            background: rgba(233, 69, 96, 0.3);
            border: 1px solid #e94560;
        }
        .result.real {
            background: rgba(46, 213, 115, 0.3);
            border: 1px solid #2ed573;
        }
        .result-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .result-info {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
        }
        .loading {
            text-align: center;
            margin-top: 10px;
            display: none;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <h2>Fake News Detector</h2>

    <textarea id="newsText" 
        placeholder="Paste news headline or article here...">
    </textarea>

    <button onclick="analyzeNews()">ANALYZE</button>

    <div class="loading" id="loading">
        Analyzing...
    </div>

    <div class="result" id="result">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-info" id="resultConfidence"></div>
        <div class="result-info" id="resultMessage"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
